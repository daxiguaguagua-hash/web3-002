name: Build & Deploy MintLedger (Docker)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重新构建镜像（忽略缓存）'
        required: false
        default: 'false'
        type: boolean

env:
  IMAGE_NAME: mintledger
  CONTAINER_NAME: mintledger-app
  HOST_PORT: 80
  CONTAINER_PORT: 80

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1: 构建 Docker 镜像并推送到 GHCR
  # ════════════════════════════════════════════════════════════════
  build:
    name: 🔨 Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 生成两个 tag：latest + git short sha
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      # 构建并推送
      # node:22-alpine 满足 @vitejs/plugin-react@5.1.4 的 engine 要求
      # pnpm@9 与 pnpm-lock.yaml lockfileVersion 9.0 严格对应
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ inputs.force_rebuild == 'true' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_APP_MODE=prod
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          platforms: linux/amd64

      - name: Summary
        run: |
          echo "### 🐳 镜像构建成功" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # JOB 2: SSH 到 EC2，拉取镜像并滚动重启容器
  # ════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE_FULL: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HOST_PORT: ${{ env.HOST_PORT }}
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
          GIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,IMAGE_FULL,CONTAINER_NAME,HOST_PORT,CONTAINER_PORT,GIT_SHA
          script: |
            set -e

            echo "════════════════════════════════════"
            echo "  MintLedger Deploy"
            echo "  Commit: ${GIT_SHA:0:7}"
            echo "  Time:   $(date)"
            echo "════════════════════════════════════"

            # ── 1. 登录 GHCR ─────────────────────────
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # ── 2. 拉取最新镜像 ──────────────────────
            echo "▶ 拉取镜像: $IMAGE_FULL"
            docker pull "$IMAGE_FULL"

            # ── 3. 停掉所有占用端口的旧容器 ─────────
            echo "▶ 停止占用 ${HOST_PORT} 端口的旧容器..."
            OLD_CONTAINERS=$(docker ps -q --filter "publish=${HOST_PORT}" || true)
            if [ -n "$OLD_CONTAINERS" ]; then
              docker stop $OLD_CONTAINERS && docker rm $OLD_CONTAINERS
              echo "  已停止旧容器"
            else
              echo "  无旧容器"
            fi

            # ── 4. 启动新容器 ────────────────────────
            NEW="${CONTAINER_NAME}-${GIT_SHA:0:7}"
            echo "▶ 启动新容器: $NEW"
            docker run -d \
              --name "$NEW" \
              --restart unless-stopped \
              -p "${HOST_PORT}:${CONTAINER_PORT}" \
              --health-cmd="curl -fs http://localhost/healthz || exit 1" \
              --health-interval=5s \
              --health-timeout=3s \
              --health-retries=5 \
              --health-start-period=30s \
              "$IMAGE_FULL"

            # ── 5. 等待健康检查通过（最多 120s）──────
            echo "▶ 等待健康检查..."
            SECONDS=0
            until [ "$(docker inspect --format='{{.State.Health.Status}}' "$NEW")" = "healthy" ]; do
              if [ $SECONDS -ge 120 ]; then
                echo "❌ 健康检查超时，回滚"
                docker stop "$NEW" && docker rm "$NEW"
                exit 1
              fi
              echo "  等待中... ${SECONDS}s / 120s"
              sleep 3
            done
            echo "✅ 健康检查通过，耗时 ${SECONDS}s"

            # 重命名为标准容器名，方便后续日志查看
            docker rename "$NEW" "$CONTAINER_NAME" 2>/dev/null || true

            # ── 6. 清理悬空镜像 ──────────────────────
            docker image prune -f

            echo ""
            echo "════════════════════════════════════"
            echo "  ✅ 部署成功！"
            docker ps --filter "name=${CONTAINER_NAME}" \
              --format "  容器: {{.Names}} | {{.Status}}"
            echo "════════════════════════════════════"

  # ════════════════════════════════════════════════════════════════
  # JOB 3: 部署失败时自动回滚到上一个镜像
  # ════════════════════════════════════════════════════════════════
  rollback-on-failure:
    name: ⏪ Auto Rollback
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: failure() && needs.deploy.result == 'failure'

    steps:
      - name: Rollback to previous image
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            echo "⏪ 开始回滚..."
            PREV=$(docker images \
              "ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}" \
              --format "{{.Repository}}:{{.Tag}}" \
              | grep -v latest | sed -n '2p')

            if [ -n "$PREV" ]; then
              docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
              docker rm   ${{ env.CONTAINER_NAME }} 2>/dev/null || true
              docker run -d \
                --name ${{ env.CONTAINER_NAME }} \
                --restart unless-stopped \
                -p ${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }} \
                "$PREV"
              echo "✅ 已回滚到: $PREV"
            else
              echo "❌ 未找到历史镜像，无法自动回滚"
              exit 1
            fi
